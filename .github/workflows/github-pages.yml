name: Deploy Rozhi Demo to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create environment file
        run: |
          cp .env.example .env
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=https://parsa-emami.github.io/rozhi-memory-lane" >> .env
          echo "ASSET_URL=https://parsa-emami.github.io/rozhi-memory-lane" >> .env
          echo "ROZHI_CAT_IMAGE=images/rozhin.jpg" >> .env

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Generate Laravel key
        run: php artisan key:generate --force

      - name: Install Node dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Start Laravel server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          sleep 5

      - name: Export static pages
        run: |
          rm -rf _site
          mkdir -p _site

          # copy public assets
          cp -R public/* _site/

          # prevent GitHub Pages Jekyll processing
          touch _site/.nojekyll

          php -r '
          $base = "http://127.0.0.1:8000";
          $pages = [
              "/" => "index.html",
              "/story" => "story/index.html",
              "/memories" => "memories/index.html",
              "/quiz" => "quiz/index.html",
              "/letter" => "letter/index.html",
              "/future" => "future/index.html",
              "/invite" => "invite/index.html",
          ];

          foreach ($pages as $url => $file) {
              $html = @file_get_contents($base . $url);

              if ($html === false) {
                  fwrite(STDERR, "Failed to export: {$url}\n");
                  exit(1);
              }

              $html = str_replace("http://127.0.0.1:8000", "https://parsa-emami.github.io/rozhi-memory-lane", $html);
              $html = str_replace("http://localhost", "https://parsa-emami.github.io/rozhi-memory-lane", $html);

              $path = "_site/" . $file;
              $dir = dirname($path);

              if (!is_dir($dir)) {
                  mkdir($dir, 0777, true);
              }

              file_put_contents($path, $html);
              echo "Exported {$url} -> {$path}\n";
          }
          '

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4